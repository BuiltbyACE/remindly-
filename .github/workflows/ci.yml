name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint
        run: pnpm lint
      
      - name: Check Prettier formatting
        run: pnpm prettier:check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build production
        run: pnpm build:production
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run unit tests with coverage
        run: pnpm test:coverage
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4200
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  accessibility-check:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build for testing
        run: pnpm build:production
      
      - name: Start server
        run: |
          npx http-server dist/remindly -p 4200 &
          sleep 5
      
      - name: Run pa11y accessibility audit
        run: |
          npx pa11y-ci --url-list <<-EOF
            http://localhost:4200/
            http://localhost:4200/login
            http://localhost:4200/dashboard
            http://localhost:4200/events
            http://localhost:4200/approvals
            http://localhost:4200/notifications
          EOF
        continue-on-error: true

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build production
        run: pnpm build:production 2>&1 | tee build-output.txt
      
      - name: Check bundle size
        run: |
          MAX_SIZE=5242880  # 5MB in bytes
          TRANSFER_SIZE=$(grep -oP 'Initial total\s+\|\s+\K[\d.]+(?=\s*MB)' build-output.txt | head -1)
          if [ -z "$TRANSFER_SIZE" ]; then
            # Fallback: check actual file sizes
            TOTAL=0
            for f in dist/remindly/*.js; do
              SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
              TOTAL=$((TOTAL + SIZE))
            done
            if [ $TOTAL -gt $MAX_SIZE ]; then
              echo "Bundle size ($TOTAL bytes) exceeds limit ($MAX_SIZE bytes)"
              exit 1
            fi
            echo "Bundle size: $TOTAL bytes (limit: $MAX_SIZE bytes) ✓"
          else
            TRANSFER_BYTES=$(echo "$TRANSFER_SIZE * 1024 * 1024" | bc | cut -d. -f1)
            if [ "$TRANSFER_BYTES" -gt "$MAX_SIZE" ]; then
              echo "Initial transfer size ($TRANSFER_SIZE MB) exceeds limit (5 MB)"
              exit 1
            fi
            echo "Initial transfer size: $TRANSFER_SIZE MB (limit: 5 MB) ✓"
          fi
